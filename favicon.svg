<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f59e0b"/>
      <stop offset="1" stop-color="#d97706"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="15" fill="url(#bg)"/>
  <!-- droopy hound ears (behind head) -->
  <ellipse cx="15" cy="37" rx="7.5" ry="18" fill="#6b3410"/>
  <ellipse cx="49" cy="37" rx="7.5" ry="18" fill="#6b3410"/>
  <!-- head -->
  <ellipse cx="32" cy="27" rx="14.5" ry="13.5" fill="#fbe3bf"/>
  <!-- muzzle -->
  <ellipse cx="32" cy="40" rx="8.5" ry="8" fill="#fff6e6"/>
  <!-- brow wrinkle -->
  <path d="M25 21 Q32 18 39 21" stroke="#e7c79a" stroke-width="1.6" fill="none" stroke-linecap="round"/>
  <!-- eyes -->
  <circle cx="26" cy="27" r="2.4" fill="#3a2410"/>
  <circle cx="38" cy="27" r="2.4" fill="#3a2410"/>
  <!-- nose -->
  <ellipse cx="32" cy="38.5" rx="3.8" ry="3" fill="#3a2410"/>
  <!-- mouth -->
  <path d="M32 41.5 L32 45 Q28.5 47 26 44.5 M32 45 Q35.5 47 38 44.5" stroke="#3a2410" stroke-width="1.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
