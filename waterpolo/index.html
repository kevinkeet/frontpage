<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
<meta name="robots" content="noindex, nofollow" />
<title>NCAA Water Polo Programs Map</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
<style>
  :root{
    --d1:#2563eb; --d2:#ea580c; --d3:#7c3aed;
    --ink:#0f172a; --muted:#64748b; --line:#e2e8f0; --bg:#f1f5f9;
    --ocean1:#0c4a6e; --ocean2:#0369a1;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;margin:0;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    color:var(--ink); background:var(--bg);
    display:flex; flex-direction:column; height:100vh; overflow:hidden;
  }

  /* ---------- Header ---------- */
  header{
    background:linear-gradient(135deg,var(--ocean1),var(--ocean2));
    color:#fff; padding:10px 16px;
    box-shadow:0 2px 10px rgba(2,8,23,.18); z-index:1000;
    display:flex; align-items:center; gap:16px 22px; flex-wrap:wrap;
  }
  .brand{display:flex; align-items:center; gap:11px; margin-right:auto;}
  .brand .logo{font-size:26px; line-height:1;}
  .brand h1{font-size:17px; margin:0; font-weight:700; letter-spacing:.2px;}
  .brand p{margin:2px 0 0; font-size:12px; color:#cfe6f5; font-weight:500;}

  .controls{display:flex; align-items:center; gap:14px 18px; flex-wrap:wrap;}
  .group{display:flex; align-items:center; gap:8px;}
  .group > .lbl{font-size:11px; text-transform:uppercase; letter-spacing:.6px; color:#bcdcef; font-weight:700;}

  .seg{display:inline-flex; background:rgba(255,255,255,.14); border-radius:999px; padding:3px;}
  .seg button{
    border:0; background:transparent; color:#e6f2fb; font-weight:600; font-size:13px;
    padding:6px 14px; border-radius:999px; cursor:pointer; transition:.15s; white-space:nowrap;
  }
  .seg button:hover{color:#fff;}
  .seg button.on{background:#fff; color:var(--ocean1); box-shadow:0 1px 4px rgba(0,0,0,.2);}

  .pill{
    display:inline-flex; align-items:center; gap:7px; cursor:pointer; user-select:none;
    border:1.5px solid rgba(255,255,255,.55); background:rgba(255,255,255,.10);
    color:#fff; font-weight:700; font-size:13px; padding:6px 13px; border-radius:999px;
    transition:.15s; opacity:.55;
  }
  .pill .swatch{width:11px; height:11px; border-radius:50%; box-shadow:0 0 0 2px rgba(255,255,255,.85);}
  .pill.on{opacity:1; background:#fff; color:var(--ink); border-color:#fff;}
  .pill:hover{opacity:.85;}
  .pill.on:hover{opacity:1;}

  .count{font-size:12.5px; color:#dff0fb; font-weight:600; white-space:nowrap;}
  .count b{color:#fff;}
  .fitbtn{
    border:1.5px solid rgba(255,255,255,.55); background:rgba(255,255,255,.10); color:#fff;
    font-weight:600; font-size:12.5px; padding:6px 12px; border-radius:8px; cursor:pointer; transition:.15s;
  }
  .fitbtn:hover{background:rgba(255,255,255,.22);}

  /* ---------- Stage / Map ---------- */
  #stage{position:relative; flex:1; overflow:hidden;}
  #map{position:absolute; inset:0; background:#aadaff;}

  .leaflet-tooltip.school-tt{
    font-weight:600; font-size:12px; color:var(--ink);
    border:0; box-shadow:0 1px 6px rgba(2,8,23,.25); border-radius:6px; padding:3px 8px;
  }

  /* ---------- Detail panel ---------- */
  #panel{
    position:absolute; top:0; right:0; height:100%; width:374px; max-width:90%;
    background:#fff; box-shadow:-8px 0 30px rgba(2,8,23,.18);
    transform:translateX(102%); transition:transform .28s cubic-bezier(.4,0,.2,1);
    z-index:1200; display:flex; flex-direction:column;
  }
  #panel.open{transform:none;}
  .panel-close{
    position:absolute; top:12px; right:12px; z-index:2; width:32px; height:32px; border-radius:50%;
    border:0; background:#f1f5f9; color:#334155; font-size:19px; line-height:1; cursor:pointer; transition:.15s;
  }
  .panel-close:hover{background:#e2e8f0;}
  .panel-body{padding:22px 22px 28px; overflow-y:auto;}
  .p-name{font-size:21px; font-weight:800; line-height:1.2; padding-right:34px;}
  .p-loc{font-size:13px; color:var(--muted); margin-top:3px; font-weight:600;}
  .p-chips{display:flex; flex-wrap:wrap; gap:7px; margin:15px 0 2px;}
  .chip{font-size:11.5px; font-weight:700; padding:4px 11px; border-radius:999px; background:#eef2f7; color:#334155; white-space:nowrap;}
  .chip-div{color:#fff;}
  .p-section{margin-top:18px;}
  .p-h{font-size:11px; text-transform:uppercase; letter-spacing:.7px; color:#94a3b8; font-weight:800; margin-bottom:7px;}
  .prg{display:flex; align-items:center; gap:8px; font-size:13.5px; padding:4px 0;}
  .prg .dot{width:10px;height:10px;border-radius:50%;flex:none;}
  .prg .gx{width:15px;text-align:center;flex:none; font-size:14px;}
  .prg .conf{color:var(--muted); margin-left:auto; font-size:12px;}
  .p-stats{display:flex; gap:10px; margin-top:18px;}
  .stat{flex:1; background:linear-gradient(160deg,#f8fafc,#eef2f7); border:1px solid var(--line); border-radius:12px; padding:12px 10px; text-align:center;}
  .stat-v{font-size:22px; font-weight:800; color:var(--ocean2); line-height:1;}
  .stat-l{font-size:11px; color:var(--muted); font-weight:700; margin-top:5px;}
  .p-desc{margin-top:18px; font-size:13.5px; line-height:1.55; color:#334155;}
  .p-foot{display:flex; flex-wrap:wrap; align-items:center; gap:10px; margin-top:18px;}
  .p-link{display:inline-flex; align-items:center; gap:6px; background:var(--ocean2); color:#fff; text-decoration:none; font-weight:700; font-size:13px; padding:9px 14px; border-radius:9px; transition:.15s;}
  .p-link:hover{background:var(--ocean1);}
  .p-badge{font-size:12px; font-weight:700; padding:6px 10px; border-radius:8px;}
  .p-badge.ok{background:#dcfce7; color:#15803d;}
  .p-note{margin-top:16px; font-size:11.5px; color:#94a3b8; line-height:1.45;}
  .p-empty{margin-top:18px; font-size:13px; color:var(--muted); background:#f8fafc; border:1px dashed var(--line); border-radius:10px; padding:14px; line-height:1.5;}

  /* ---------- Lock screen ---------- */
  #lock{
    position:fixed; inset:0; z-index:3000; display:flex; align-items:center; justify-content:center;
    background:linear-gradient(135deg,var(--ocean1),var(--ocean2)); padding:24px;
  }
  #lock.hidden{display:none;}
  .lock-card{
    background:#fff; border-radius:18px; padding:34px 30px 28px; width:100%; max-width:362px;
    box-shadow:0 24px 60px rgba(2,8,23,.35); text-align:center;
  }
  .lock-logo{font-size:46px; line-height:1;}
  .lock-card h2{margin:12px 0 4px; font-size:20px; color:var(--ink);}
  .lock-card p{margin:0 0 20px; font-size:13.5px; color:var(--muted);}
  #lockForm{display:flex; flex-direction:column; gap:10px;}
  #lockInput{
    width:100%; padding:12px 14px; font-size:16px; border:1.5px solid var(--line);
    border-radius:10px; text-align:center; letter-spacing:1px;
  }
  #lockInput:focus{outline:none; border-color:var(--ocean2); box-shadow:0 0 0 3px rgba(3,105,161,.15);}
  #lockForm button{
    padding:12px; font-size:15px; font-weight:700; color:#fff; background:var(--ocean2);
    border:0; border-radius:10px; cursor:pointer; transition:.15s;
  }
  #lockForm button:hover{background:var(--ocean1);}
  #lockForm button:disabled{opacity:.5; cursor:not-allowed;}
  .lock-error{margin-top:14px; font-size:13px; font-weight:600; color:#dc2626; line-height:1.4;}
  .lock-busy{margin-top:14px; font-size:13px; color:var(--muted);}

  @media (max-width:720px){
    header{padding:9px 12px; gap:9px 14px;}
    .brand{margin-right:0; width:100%;}
    .brand h1{font-size:15px;}
    .controls{width:100%; gap:10px 14px;}
    .group > .lbl{display:none;}
    #panel{top:auto; bottom:0; left:0; right:0; width:auto; max-width:none; height:auto; max-height:76%;
      transform:translateY(102%); border-radius:18px 18px 0 0; box-shadow:0 -8px 30px rgba(2,8,23,.22);}
    #panel.open{transform:none;}
    .panel-body{padding-top:26px;}
    #panel::before{content:""; position:absolute; top:8px; left:50%; transform:translateX(-50%);
      width:40px; height:4px; border-radius:99px; background:#cbd5e1;}
  }
</style>
</head>
<body>
<header>
  <div class="brand">
    <span class="logo">🤽</span>
    <div>
      <h1>NCAA Water Polo Programs</h1>
      <p>Every varsity men's &amp; women's program · 2025 season</p>
    </div>
  </div>

  <div class="controls">
    <div class="group" id="genderSeg">
      <span class="lbl">Show</span>
      <div class="seg">
        <button data-g="all" class="on">Both</button>
        <button data-g="men">Men's</button>
        <button data-g="women">Women's</button>
      </div>
    </div>

    <div class="group" id="divGroup">
      <span class="lbl">Division</span>
      <span class="pill on" data-d="D1"><span class="swatch" style="background:var(--d1)"></span>D1</span>
      <span class="pill on" data-d="D2"><span class="swatch" style="background:var(--d2)"></span>D2</span>
      <span class="pill on" data-d="D3"><span class="swatch" style="background:var(--d3)"></span>D3</span>
    </div>

    <div class="group">
      <span class="count" id="count"></span>
      <button class="fitbtn" id="fit" title="Zoom to fit all visible schools">⤢ Fit</button>
    </div>
  </div>
</header>

<div id="stage">
  <div id="map"></div>
  <aside id="panel" aria-hidden="true">
    <button class="panel-close" id="panelClose" aria-label="Close">✕</button>
    <div class="panel-body" id="panelBody"></div>
  </aside>
</div>

<!-- Access gate -->
<div id="lock">
  <div class="lock-card">
    <div class="lock-logo">🤽</div>
    <h2>NCAA Water Polo Map</h2>
    <p>Enter the access code to view the map.</p>
    <form id="lockForm" autocomplete="off">
      <input id="lockInput" type="password" inputmode="text" placeholder="Access code" aria-label="Access code" autofocus />
      <button type="submit" id="lockBtn">Unlock</button>
    </form>
    <div class="lock-busy" id="lockBusy" hidden>Unlocking…</div>
    <div class="lock-error" id="lockError" hidden>Incorrect code — try again.</div>
  </div>
</div>

let SCHOOLS = [];
let RATED = 0;
let map, layer;

const state = { gender:"all", divs:new Set(["D1","D2","D3"]) };

/* ---------- helpers ---------- */
function programsOf(s){
  const out = [];
  if(s.m) out.push({g:"men", div:s.m[0], conf:s.m[1]});
  if(s.w) out.push({g:"women", div:s.w[0], conf:s.w[1]});
  return out;
}
function schoolDiv(s){ return (s.m || s.w)[0]; }
function hasProfile(s){ return !!(s.desc || s.region || s.size || s.type || s.acad != null || s.wp != null || s.link); }
function matchingPrograms(s){
  return programsOf(s).filter(p =>
    (state.gender==="all" || state.gender===p.g) && state.divs.has(p.div));
}

/* ---------- detail panel ---------- */
const panel = document.getElementById("panel");
const panelBody = document.getElementById("panelBody");
function closePanel(){ panel.classList.remove("open"); panel.setAttribute("aria-hidden","true"); }
function openPanel(s){
  const div = schoolDiv(s);
  let chips = `<span class="chip chip-div" style="background:${DIV[div]}">${DIV_NAME[div]}</span>`;
  if(s.type) chips += `<span class="chip">${s.type}</span>`;
  if(s.size) chips += `<span class="chip">${s.size}</span>`;

  const loc = `${s.c}, ${s.s}` + (s.region ? ` &middot; ${s.region}` : "");

  const prg = programsOf(s).map(p => `
    <div class="prg">
      <span class="dot" style="background:${DIV[p.div]}"></span>
      <span class="gx">${p.g==="men"?"♂":"♀"}</span>
      <b>${p.g==="men"?"Men's":"Women's"}</b> &middot; ${p.div}
      <span class="conf">${p.conf}</span>
    </div>`).join("");

  let stats = "";
  if(s.acad != null || s.wp != null){
    stats = `<div class="p-stats">
      ${s.acad!=null?`<div class="stat"><div class="stat-v">#${s.acad}</div><div class="stat-l">Academic rigor</div></div>`:""}
      ${s.wp!=null?`<div class="stat"><div class="stat-v">#${s.wp}</div><div class="stat-l">Water&nbsp;polo level</div></div>`:""}
    </div>`;
  }

  const desc = s.desc ? `<div class="p-desc">${s.desc}</div>` : "";

  let foot = "";
  if(s.link || s.formFilled){
    foot = `<div class="p-foot">
      ${s.link?`<a class="p-link" href="${s.link}" target="_blank" rel="noopener">Recruiting questionnaire ↗</a>`:""}
      ${s.formFilled?`<span class="p-badge ok">✓ Form submitted</span>`:""}
    </div>`;
  }

  const note = (s.acad!=null||s.wp!=null)
    ? `<div class="p-note">Academic &amp; water-polo ranks are 1–${RATED} across the profiled schools in the source sheet (1 = toughest).</div>` : "";

  const empty = hasProfile(s) ? ""
    : `<div class="p-empty">No extra profile for this school in the spreadsheet yet — showing program info only.</div>`;

  panelBody.innerHTML = `
    <div class="p-name">${s.n}</div>
    <div class="p-loc">${loc}</div>
    <div class="p-chips">${chips}</div>
    <div class="p-section"><div class="p-h">Programs</div>${prg}</div>
    ${stats}${desc}${foot}${empty}${note}`;

  panel.classList.add("open");
  panel.setAttribute("aria-hidden","false");
}
document.getElementById("panelClose").addEventListener("click", closePanel);

/* ---------- render ---------- */
function render(){
  layer.clearLayers();
  let schools = 0, programs = 0, profiled = 0;
  SCHOOLS.forEach(s => {
    const matches = matchingPrograms(s);
    if(matches.length === 0) return;
    schools++; programs += matches.length;
    const detail = hasProfile(s);
    if(detail) profiled++;
    const color = DIV[schoolDiv(s)];
    L.circleMarker([s.lat, s.lng], {
      radius: detail ? 8 : 6,
      color:"#fff", weight: detail ? 2 : 1.4,
      fillColor:color, fillOpacity: detail ? .95 : .78
    })
      .bindTooltip(s.n + (detail ? "  ⓘ" : ""), {className:"school-tt", direction:"top", offset:[0,-6]})
      .on("click", () => openPanel(s))
      .addTo(layer);
  });
  document.getElementById("count").innerHTML =
    `<b>${schools}</b> ${schools===1?"school":"schools"} · <b>${programs}</b> ${programs===1?"program":"programs"} · <b>${profiled}</b> profiled`;
}
function fitVisible(){
  const pts = [];
  SCHOOLS.forEach(s => { if(matchingPrograms(s).length) pts.push([s.lat, s.lng]); });
  if(pts.length) map.fitBounds(pts, {padding:[40,40], maxZoom:7});
}

/* ---------- app init (runs only after the code unlocks the data) ---------- */
function initApp(data){
  SCHOOLS = data;
  RATED = SCHOOLS.filter(s => s.acad != null).length;

  map = L.map("map", {zoomControl:true, worldCopyJump:true}).setView([39.5, -98.35], 4);
  L.tileLayer("https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png", {
    attribution:'&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/attributions">CARTO</a>',
    subdomains:"abcd", maxZoom:19
  }).addTo(map);
  layer = L.layerGroup().addTo(map);
  map.on("click", closePanel);

  document.querySelectorAll("#genderSeg .seg button").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll("#genderSeg .seg button").forEach(b => b.classList.remove("on"));
      btn.classList.add("on");
      state.gender = btn.dataset.g;
      render();
    });
  });
  document.querySelectorAll("#divGroup .pill").forEach(pill => {
    pill.addEventListener("click", () => {
      const d = pill.dataset.d;
      if(state.divs.has(d)){ state.divs.delete(d); pill.classList.remove("on"); }
      else { state.divs.add(d); pill.classList.add("on"); }
      render();
    });
  });
  document.getElementById("fit").addEventListener("click", fitVisible);

  render();
  setTimeout(() => map.invalidateSize(), 80);
}

/* ---------- lock / decryption ---------- */
const lock = document.getElementById("lock");
const lockForm = document.getElementById("lockForm");
const lockInput = document.getElementById("lockInput");
const lockError = document.getElementById("lockError");
const lockBusy = document.getElementById("lockBusy");
const lockBtn = document.getElementById("lockBtn");

function b64ToBytes(s){
  const bin = atob(s); const u = new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) u[i] = bin.charCodeAt(i);
  return u;
}
async function decryptData(pw){
  const ec = new TextEncoder();
  const km = await crypto.subtle.importKey("raw", ec.encode(pw), "PBKDF2", false, ["deriveKey"]);
  const key = await crypto.subtle.deriveKey(
    {name:"PBKDF2", salt:b64ToBytes(CRYPTO.salt), iterations:CRYPTO.iter, hash:"SHA-256"},
    km, {name:"AES-GCM", length:256}, false, ["decrypt"]);
  const pt = await crypto.subtle.decrypt({name:"AES-GCM", iv:b64ToBytes(CRYPTO.iv)}, key, b64ToBytes(CRYPTO.ct));
  return JSON.parse(new TextDecoder().decode(pt));
}
async function attempt(pw, fromSaved){
  try{
    const data = await decryptData(pw);
    sessionStorage.setItem("wp_code", pw);
    lock.classList.add("hidden");
    initApp(data);
    return true;
  }catch(e){
    if(!fromSaved){
      lockBusy.hidden = true;
      lockError.hidden = false;
      lockInput.value = ""; lockInput.focus();
    }
    return false;
  }
}
if(!(window.isSecureContext && window.crypto && window.crypto.subtle)){
  lockError.textContent = "Open this page over https (e.g. kevinkeet.com/waterpolo) — unlocking needs a secure connection.";
  lockError.hidden = false;
  lockInput.disabled = true; lockBtn.disabled = true;
} else {
  lockForm.addEventListener("submit", async (e) => {
    e.preventDefault();
    lockError.hidden = true; lockBusy.hidden = false; lockBtn.disabled = true;
    await attempt(lockInput.value.trim(), false);
    lockBusy.hidden = true; lockBtn.disabled = false;
  });
  const saved = sessionStorage.getItem("wp_code");
  if(saved){ attempt(saved, true); }
}
</script>
