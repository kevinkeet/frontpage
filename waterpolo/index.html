<style>
  :root{
    --d1:#2563eb; --d2:#ea580c; --d3:#7c3aed; --jc:#0d9488;
    --ink:#0f172a; --muted:#64748b; --line:#e2e8f0; --bg:#f1f5f9;
    --ocean1:#0c4a6e; --ocean2:#0369a1;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;margin:0;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    color:var(--ink); background:var(--bg);
    display:flex; flex-direction:column; height:100vh; overflow:hidden;
  }

  /* ---------- Header ---------- */
  header{
    background:linear-gradient(135deg,var(--ocean1),var(--ocean2));
    color:#fff; padding:10px 16px;
    box-shadow:0 2px 10px rgba(2,8,23,.18); z-index:1000;
    display:flex; align-items:center; gap:16px 22px; flex-wrap:wrap;
  }
  .brand{display:flex; align-items:center; gap:11px; margin-right:auto;}
  .brand .logo{font-size:26px; line-height:1;}
  .brand h1{font-size:17px; margin:0; font-weight:700; letter-spacing:.2px;}
  .brand p{margin:2px 0 0; font-size:12px; color:#cfe6f5; font-weight:500;}

  .controls{display:flex; align-items:center; gap:14px 18px; flex-wrap:wrap;}
  .group{display:flex; align-items:center; gap:8px;}
  .group > .lbl{font-size:11px; text-transform:uppercase; letter-spacing:.6px; color:#bcdcef; font-weight:700;}

  .seg{display:inline-flex; background:rgba(255,255,255,.14); border-radius:999px; padding:3px;}
  .seg button{
    border:0; background:transparent; color:#e6f2fb; font-weight:600; font-size:13px;
    padding:6px 14px; border-radius:999px; cursor:pointer; transition:.15s; white-space:nowrap;
  }
  .seg button:hover{color:#fff;}
  .seg button.on{background:#fff; color:var(--ocean1); box-shadow:0 1px 4px rgba(0,0,0,.2);}

  .pill{
    display:inline-flex; align-items:center; gap:7px; cursor:pointer; user-select:none;
    border:1.5px solid rgba(255,255,255,.55); background:rgba(255,255,255,.10);
    color:#fff; font-weight:700; font-size:13px; padding:6px 13px; border-radius:999px;
    transition:.15s; opacity:.55;
  }
  .pill .swatch{width:11px; height:11px; border-radius:50%; box-shadow:0 0 0 2px rgba(255,255,255,.85);}
  .pill.on{opacity:1; background:#fff; color:var(--ink); border-color:#fff;}
  .pill:hover{opacity:.85;}
  .pill.on:hover{opacity:1;}

  .count{font-size:12.5px; color:#dff0fb; font-weight:600; white-space:nowrap;}
  .count b{color:#fff;}
  .fitbtn{
    border:1.5px solid rgba(255,255,255,.55); background:rgba(255,255,255,.10); color:#fff;
    font-weight:600; font-size:12.5px; padding:6px 12px; border-radius:8px; cursor:pointer; transition:.15s;
  }
  .fitbtn:hover{background:rgba(255,255,255,.22);}

  /* search */
  .search-wrap{position:relative;}
  #search{
    width:172px; max-width:48vw; padding:7px 13px; font-size:13px; border-radius:999px;
    border:1.5px solid rgba(255,255,255,.55); background:rgba(255,255,255,.14); color:#fff; transition:.15s;
  }
  #search::placeholder{color:#cfe6f5;}
  #search:focus{outline:none; background:#fff; color:var(--ink); border-color:#fff;}
  #searchResults{
    position:absolute; top:calc(100% + 6px); left:0; min-width:230px; background:#fff; border-radius:12px;
    box-shadow:0 14px 36px rgba(2,8,23,.30); overflow-y:auto; max-height:340px; z-index:1500; display:none;
  }
  #searchResults.show{display:block;}
  .sr-item{display:flex; align-items:center; gap:9px; padding:9px 13px; cursor:pointer; border-bottom:1px solid #f1f5f9;}
  .sr-item:last-child{border-bottom:0;}
  .sr-item:hover, .sr-item.active{background:#eff6ff;}
  .sr-dot{width:9px; height:9px; border-radius:50%; flex:none;}
  .sr-name{font-size:13.5px; font-weight:600; color:var(--ink);}
  .sr-meta{font-size:11.5px; color:var(--muted); margin-left:auto; white-space:nowrap; padding-left:10px;}
  .sr-empty{padding:12px 13px; font-size:13px; color:var(--muted);}

  /* filters dropdown */
  .fbtn{border:1.5px solid rgba(255,255,255,.55); background:rgba(255,255,255,.10); color:#fff; font-weight:600; font-size:12.5px; padding:6px 12px; border-radius:8px; cursor:pointer; display:inline-flex; align-items:center; gap:6px; transition:.15s;}
  .fbtn:hover{background:rgba(255,255,255,.22);}
  .fbtn.active{background:#fff; color:var(--ocean1); border-color:#fff;}
  .fbtn-caret{font-size:10px; opacity:.85;}
  #filterCount{background:var(--ocean2); color:#fff; font-size:11px; font-weight:800; min-width:18px; height:18px; padding:0 5px; border-radius:99px; display:none; align-items:center; justify-content:center;}
  .fbtn.active #filterCount{background:var(--ocean1);}
  #filterPanel{position:absolute; top:10px; left:10px; right:10px; max-width:560px; max-height:calc(100% - 20px); overflow-y:auto; margin:0 auto; background:#fff; border-radius:14px; box-shadow:0 18px 50px rgba(2,8,23,.30); z-index:1300; padding:13px 16px 16px;}
  .fp-grid{display:grid; grid-template-columns:1fr 1fr; gap:2px 22px;}
  @media(max-width:580px){ .fp-grid{grid-template-columns:1fr;} }
  #filterPanel.hidden{display:none;}
  .fp-head{display:flex; align-items:center; gap:14px;}
  .fp-head > span{font-weight:800; font-size:14px; color:var(--ink); margin-right:auto;}
  .fp-head button{border:0; background:transparent; cursor:pointer; font-weight:700; font-size:13px; color:var(--ocean2); padding:2px 4px;}
  #fpClose{color:var(--muted); font-size:17px;}
  .fp-section{margin-top:13px;}
  .fp-h{font-size:11px; text-transform:uppercase; letter-spacing:.6px; color:#94a3b8; font-weight:800; margin-bottom:8px;}
  .fp-pills{display:flex; flex-wrap:wrap; gap:7px;}
  .fp-pill{font-size:12.5px; font-weight:600; padding:6px 12px; border-radius:999px; border:1.5px solid var(--line); background:#fff; color:var(--muted); cursor:pointer; user-select:none; transition:.12s;}
  .fp-pill.on{background:var(--ocean2); border-color:var(--ocean2); color:#fff;}
  .fp-pill:not(.on):hover{border-color:var(--ocean2); color:var(--ink);}

  /* ---------- Stage / Map ---------- */
  #stage{position:relative; flex:1; overflow:hidden;}
  #map{position:absolute; inset:0; background:#aadaff;}

  .leaflet-tooltip.school-tt{
    font-weight:600; font-size:12px; color:var(--ink);
    border:0; box-shadow:0 1px 6px rgba(2,8,23,.25); border-radius:6px; padding:3px 8px;
  }

  /* ---------- Detail panel ---------- */
  #panel{
    position:absolute; top:0; right:0; height:100%; width:374px; max-width:90%;
    background:#fff; box-shadow:-8px 0 30px rgba(2,8,23,.18);
    transform:translateX(102%); transition:transform .28s cubic-bezier(.4,0,.2,1);
    z-index:1200; display:flex; flex-direction:column;
  }
  #panel.open{transform:none;}
  .panel-close{
    position:absolute; top:12px; right:12px; z-index:2; width:32px; height:32px; border-radius:50%;
    border:0; background:#f1f5f9; color:#334155; font-size:19px; line-height:1; cursor:pointer; transition:.15s;
  }
  .panel-close:hover{background:#e2e8f0;}
  .panel-body{padding:0; overflow-y:auto;}
  .p-photo{position:relative; width:100%; height:158px; background:#dfe6ee; overflow:hidden; flex:none;}
  .p-photo img{width:100%; height:100%; object-fit:cover; display:block;}
  .p-photo-grad{position:absolute; inset:0; background:linear-gradient(to top, rgba(2,8,23,.82) 0%, rgba(2,8,23,.15) 48%, rgba(2,8,23,0) 72%);}
  .p-photo-name{position:absolute; left:18px; right:84px; bottom:11px; color:#fff; font-size:21px; font-weight:800; line-height:1.16; text-shadow:0 1px 8px rgba(0,0,0,.55);}
  .p-gnav{position:absolute; top:50%; transform:translateY(-50%); width:30px; height:30px; border-radius:50%; border:0; background:rgba(15,23,42,.42); color:#fff; font-size:18px; line-height:1; cursor:pointer; z-index:2; display:flex; align-items:center; justify-content:center; padding:0;}
  .p-gnav:hover{background:rgba(15,23,42,.72);}
  .p-gnav.prev{left:8px;}
  .p-gnav.next{right:8px;}
  .p-dots{position:absolute; right:14px; bottom:14px; display:flex; gap:5px; z-index:2;}
  .p-dot{width:6px; height:6px; border-radius:50%; background:rgba(255,255,255,.55); cursor:pointer;}
  .p-dot.on{background:#fff;}
  .p-kv{display:flex; flex-direction:column; gap:9px;}
  .kv{display:flex; gap:12px; font-size:13px; line-height:1.45;}
  .kv-k{flex:none; width:104px; color:var(--muted); font-weight:700;}
  .kv-v{color:var(--ink); flex:1;}
  .staff-team{margin-top:12px;}
  .staff-team:first-child{margin-top:2px;}
  .staff-team-h{font-size:12px; font-weight:800; color:var(--ocean2); text-transform:uppercase; letter-spacing:.4px; margin-bottom:5px;}
  .coach{padding:5px 0; border-bottom:1px solid #f1f5f9;}
  .coach:last-child{border-bottom:0;}
  .coach-top{font-size:13px; color:var(--ink);}
  .coach-role{color:var(--muted); font-weight:600; font-size:12px;}
  .coach-email{display:inline-block; font-size:12px; color:var(--ocean2); text-decoration:none; margin-top:1px; word-break:break-all;}
  .coach-email:hover{text-decoration:underline;}
  .p-pad{padding:18px 22px 28px;}
  .p-name{font-size:21px; font-weight:800; line-height:1.2; padding-right:34px;}
  .p-loc{font-size:13px; color:var(--muted); margin-top:3px; font-weight:600;}
  .p-chips{display:flex; flex-wrap:wrap; gap:7px; margin:15px 0 2px;}
  .chip{font-size:11.5px; font-weight:700; padding:4px 11px; border-radius:999px; background:#eef2f7; color:#334155; white-space:nowrap;}
  .chip-div{color:#fff;}
  .p-section{margin-top:18px;}
  .p-h{font-size:11px; text-transform:uppercase; letter-spacing:.7px; color:#94a3b8; font-weight:800; margin-bottom:7px;}
  .prg{display:flex; align-items:center; gap:8px; font-size:13.5px; padding:4px 0;}
  .prg .dot{width:10px;height:10px;border-radius:50%;flex:none;}
  .prg .gx{width:15px;text-align:center;flex:none; font-size:14px;}
  .prg .conf{color:var(--muted); margin-left:auto; font-size:12px;}
  .p-stats{display:flex; gap:10px; margin-top:18px;}
  .stat{flex:1; background:linear-gradient(160deg,#f8fafc,#eef2f7); border:1px solid var(--line); border-radius:12px; padding:12px 10px; text-align:center;}
  .stat-v{font-size:17px; font-weight:800; color:var(--ocean2); line-height:1.15;}
  .stat-l{font-size:11px; color:var(--muted); font-weight:700; margin-top:5px;}
  .p-desc{margin-top:18px; font-size:13.5px; line-height:1.55; color:#334155;}
  .p-foot{display:flex; flex-wrap:wrap; align-items:center; gap:10px; margin-top:18px;}
  .p-link{display:inline-flex; align-items:center; gap:6px; background:var(--ocean2); color:#fff; text-decoration:none; font-weight:700; font-size:13px; padding:9px 14px; border-radius:9px; transition:.15s;}
  .p-link:hover{background:var(--ocean1);}
  .p-link.alt{background:#fff; color:var(--ocean2); border:1.5px solid var(--ocean2);}
  .p-link.alt:hover{background:#eff6ff; color:var(--ocean1);}
  .p-badge{font-size:12px; font-weight:700; padding:6px 10px; border-radius:8px;}
  .p-badge.ok{background:#dcfce7; color:#15803d;}
  .p-note{margin-top:16px; font-size:11.5px; color:#94a3b8; line-height:1.45;}
  .p-empty{margin-top:18px; font-size:13px; color:var(--muted); background:#f8fafc; border:1px dashed var(--line); border-radius:10px; padding:14px; line-height:1.5;}

  /* ---------- Lock screen ---------- */
  #lock{
    position:fixed; inset:0; z-index:3000; display:flex; align-items:center; justify-content:center;
    background:linear-gradient(135deg,var(--ocean1),var(--ocean2)); padding:24px;
  }
  #lock.hidden{display:none;}
  .lock-card{
    background:#fff; border-radius:18px; padding:34px 30px 28px; width:100%; max-width:362px;
    box-shadow:0 24px 60px rgba(2,8,23,.35); text-align:center;
  }
  .lock-logo{font-size:46px; line-height:1;}
  .lock-card h2{margin:12px 0 4px; font-size:20px; color:var(--ink);}
  .lock-card p{margin:0 0 20px; font-size:13.5px; color:var(--muted);}
  #lockForm{display:flex; flex-direction:column; gap:10px;}
  #lockInput{
    width:100%; padding:12px 14px; font-size:16px; border:1.5px solid var(--line);
    border-radius:10px; text-align:center; letter-spacing:1px;
  }
  #lockInput:focus{outline:none; border-color:var(--ocean2); box-shadow:0 0 0 3px rgba(3,105,161,.15);}
  #lockForm button{
    padding:12px; font-size:15px; font-weight:700; color:#fff; background:var(--ocean2);
    border:0; border-radius:10px; cursor:pointer; transition:.15s;
  }
  #lockForm button:hover{background:var(--ocean1);}
  #lockForm button:disabled{opacity:.5; cursor:not-allowed;}
  .lock-error{margin-top:14px; font-size:13px; font-weight:600; color:#dc2626; line-height:1.4;}
  .lock-busy{margin-top:14px; font-size:13px; color:var(--muted);}

  @media (max-width:720px){
    header{padding:9px 12px; gap:9px 14px;}
    .brand{margin-right:0; width:100%;}
    .brand h1{font-size:15px;}
    .controls{width:100%; gap:10px 14px;}
    .group > .lbl{display:none;}
    #panel{top:auto; bottom:0; left:0; right:0; width:auto; max-width:none; height:auto; max-height:76%;
      transform:translateY(102%); border-radius:18px 18px 0 0; box-shadow:0 -8px 30px rgba(2,8,23,.22);}
    #panel.open{transform:none;}
    .p-photo{border-radius:18px 18px 0 0;}
    .p-pad{padding-top:20px;}
    #panel::before{content:""; position:absolute; top:8px; left:50%; transform:translateX(-50%);
      width:40px; height:4px; border-radius:99px; background:#cbd5e1;}
  }
</style>
</head>
<body>
<header>
  <div class="brand">
    <span class="logo">🤽</span>
    <div>
      <h1>College Water Polo Programs</h1>
      <p>NCAA + CA community college (men's) · 2025 season</p>
    </div>
  </div>

  <div class="controls">
    <div class="group search-wrap">
      <input id="search" type="text" placeholder="Search schools…" autocomplete="off" aria-label="Search schools" />
      <div id="searchResults"></div>
    </div>
    <div class="group" id="genderSeg">
      <span class="lbl">Show</span>
      <div class="seg">
        <button data-g="all" class="on">Both</button>
        <button data-g="men">Men's</button>
        <button data-g="women">Women's</button>
      </div>
    </div>

    <div class="group" id="divGroup">
      <span class="lbl">Division</span>
      <span class="pill on" data-d="D1"><span class="swatch" style="background:var(--d1)"></span>D1</span>
      <span class="pill on" data-d="D2"><span class="swatch" style="background:var(--d2)"></span>D2</span>
      <span class="pill on" data-d="D3"><span class="swatch" style="background:var(--d3)"></span>D3</span>
      <span class="pill on" data-d="JC"><span class="swatch" style="background:var(--jc)"></span>CA JC</span>
    </div>

    <div class="group">
      <button class="fbtn" id="filterBtn" type="button">Filters<span class="fbtn-caret">▾</span><span id="filterCount"></span></button>
      <span class="count" id="count"></span>
      <button class="fitbtn" id="fit" title="Zoom to fit all visible schools">⤢ Fit</button>
    </div>
  </div>
</header>

<div id="stage">
  <div id="map"></div>
  <div id="filterPanel" class="hidden"></div>
  <aside id="panel" aria-hidden="true">
    <button class="panel-close" id="panelClose" aria-label="Close">✕</button>
    <div class="panel-body" id="panelBody"></div>
  </aside>
</div>

let SCHOOLS = [];
let RATED = 0;
let map, layer;

const FILTERS = [
  {key:"acad",    label:"Academic difficulty",   opts:["Elite","Very high","High","Moderate"]},
  {key:"wp",      label:"Water polo level",       opts:["Elite","Strong","Competitive","Developing"]},
  {key:"cost",    label:"Cost / yr (before aid)", opts:["Under $40k","$40k–$65k","$65k–$85k","$85k+","Free"]},
  {key:"size",    label:"School size",            opts:["Small","Medium","Large","Very large"]},
  {key:"type",    label:"Public / private",       opts:["Public","Private"]},
  {key:"aid",     label:"Athletic scholarships",  opts:["Athletic $","No athletic $","Free (academy)"]},
  {key:"setting", label:"Campus setting",         opts:["Urban","Suburban","Small town","Rural"]},
  {key:"region",  label:"Region",                 opts:["West","Pacific","Midwest","South","Mid-Atlantic","Northeast"]}
];
const state = { gender:"all", divs:new Set(["D1","D2","D3","JC"]) };
FILTERS.forEach(f => state[f.key] = new Set(f.opts));

/* ---------- helpers ---------- */
function programsOf(s){
  const out = [];
  if(s.m) out.push({g:"men", div:s.m[0], conf:s.m[1]});
  if(s.w) out.push({g:"women", div:s.w[0], conf:s.w[1]});
  return out;
}
function schoolDiv(s){ return (s.m || s.w)[0]; }
function hasProfile(s){ return !!(s.desc || s.region || s.size || s.type || s.acad != null || s.wp != null || s.link); }
function matchingPrograms(s){
  return programsOf(s).filter(p =>
    (state.gender==="all" || state.gender===p.g) && state.divs.has(p.div));
}
function acadTier(s){ const r=s.acad; return r==null?null : r<=17?"Elite" : r<=35?"Very high" : r<=52?"High" : "Moderate"; }
function wpTier(s){ const r=s.wp; return r==null?null : r<=15?"Elite" : r<=35?"Strong" : r<=52?"Competitive" : "Developing"; }
function sizeCat(s){ if(!s.size) return null; return s.size.indexOf("Very large")===0 ? "Very large" : s.size.split(" ")[0]; }
function typeCat(s){ if(!s.type) return null; return s.type.indexOf("Public")===0 ? "Public" : "Private"; }
function costTier(s){
  if(!s.cost) return null;
  if(/free/i.test(s.cost)) return "Free";
  const nums = (s.cost.match(/\$\s*([0-9]+(?:\.[0-9]+)?)k/gi) || []).map(x => parseFloat(x.replace(/[^0-9.]/g,"")));
  if(!nums.length) return null;
  const v = Math.max(...nums); // out-of-state / sticker
  return v < 40 ? "Under $40k" : v < 65 ? "$40k–$65k" : v < 85 ? "$65k–$85k" : "$85k+";
}
function regionCat(s){ return s.region ? s.region.split(" (")[0].trim() : null; }
function aidCat(s){ if(!s.aid) return null; return /service academy/i.test(s.aid) ? "Free (academy)" : /^No athletic/i.test(s.aid) ? "No athletic $" : "Athletic $"; }
function valOf(key,s){
  switch(key){
    case "acad": return acadTier(s);
    case "wp": return wpTier(s);
    case "size": return sizeCat(s);
    case "type": return typeCat(s);
    case "cost": return costTier(s);
    case "setting": return s.setting || null;
    case "region": return regionCat(s);
    case "aid": return aidCat(s);
  }
  return null;
}
function passesFilters(s){
  for(const f of FILTERS){ const v = valOf(f.key, s); if(v != null && !state[f.key].has(v)) return false; }
  return true;
}

/* ---------- detail panel ---------- */
const panel = document.getElementById("panel");
const panelBody = document.getElementById("panelBody");
function closePanel(){ panel.classList.remove("open"); panel.setAttribute("aria-hidden","true"); }
function openPanel(s){
  const div = schoolDiv(s);
  let chips = `<span class="chip chip-div" style="background:${DIV[div]}">${DIV_NAME[div]}</span>`;
  if(s.type) chips += `<span class="chip">${s.type}</span>`;
  if(s.size) chips += `<span class="chip">${s.size}</span>`;

  const loc = `${s.c}, ${s.s}` + (s.region ? ` &middot; ${s.region}` : "");

  const prg = programsOf(s).map(p => `
    <div class="prg">
      <span class="dot" style="background:${DIV[p.div]}"></span>
      <span class="gx">${p.g==="men"?"♂":"♀"}</span>
      <b>${p.g==="men"?"Men's":"Women's"}</b> &middot; ${p.div}
      <span class="conf">${p.conf}</span>
    </div>`).join("");

  let stats = "";
  if(s.acad != null || s.wp != null){
    stats = `<div class="p-stats">
      ${s.acad!=null?`<div class="stat"><div class="stat-v">${acadTier(s)}</div><div class="stat-l">Academic rigor</div></div>`:""}
      ${s.wp!=null?`<div class="stat"><div class="stat-v">${wpTier(s)}</div><div class="stat-l">Water polo</div></div>`:""}
    </div>`;
  }

  const desc = s.desc ? `<div class="p-desc">${s.desc}</div>` : "";

  // "For recruits" facts (women's-focused)
  const rows = [];
  if(s.accolades && s.accolades !== "(men's program only)") rows.push(["Program", s.accolades]);
  if(!s.w && schoolDiv(s) !== "JC") rows.push(["Women's water polo", "Not offered (men's program only)"]);
  if(s.pool) rows.push(["Home pool", s.pool]);
  if(s.accept) rows.push(["Acceptance rate", s.accept]);
  if(s.cost) rows.push(["Est. cost / yr", s.cost]);
  if(s.aid) rows.push(["Scholarships", s.aid]);
  if(s.setting) rows.push(["Setting", s.setting]);
  const recruit = rows.length
    ? `<div class="p-section"><div class="p-h">For recruits</div><div class="p-kv">${
        rows.map(([k,v]) => `<div class="kv"><span class="kv-k">${k}</span><span class="kv-v">${v}</span></div>`).join("")
      }</div></div>` : "";

  // Coaching staff (women's and/or men's), with emails
  const staffBlock = (label, arr) => {
    if(!arr || !arr.length) return "";
    const people = arr.map(c => `<div class="coach"><div class="coach-top"><b>${c.n}</b>${c.r?` <span class="coach-role">· ${c.r}</span>`:""}</div>${c.e?`<a class="coach-email" href="mailto:${c.e}">${c.e}</a>`:""}</div>`).join("");
    return `<div class="staff-team">${label?`<div class="staff-team-h">${label}</div>`:""}${people}</div>`;
  };
  const dual = s.staffW && s.staffM;
  const coaching = (s.staffW || s.staffM)
    ? `<div class="p-section"><div class="p-h">Coaching staff</div>${staffBlock(dual?"Women's":"", s.staffW)}${staffBlock(dual?"Men's":"", s.staffM)}</div>`
    : "";

  let foot = "";
  if(s.teamW || s.link || s.formFilled){
    foot = `<div class="p-foot">
      ${s.teamW?`<a class="p-link" href="${s.teamW}" target="_blank" rel="noopener">Team page ↗</a>`:""}
      ${s.link?`<a class="p-link alt" href="${s.link}" target="_blank" rel="noopener">Recruiting questionnaire ↗</a>`:""}
      ${s.formFilled?`<span class="p-badge ok">✓ Form submitted</span>`:""}
    </div>`;
  }

  const note = (s.acad!=null||s.wp!=null)
    ? `<div class="p-note">Levels are relative across all programs (academic = selectivity; water polo = competitive strength). Coaches &amp; costs change year to year — verify with the program.</div>` : "";

  const empty = hasProfile(s) ? ""
    : `<div class="p-empty">No extra profile for this school yet — showing program info only.</div>`;

  // photo gallery
  gal = { urls: (s.gallery && s.gallery.length ? s.gallery.slice() : (s.img ? [s.img] : [])), idx: 0 };
  const multi = gal.urls.length > 1;
  const photo = gal.urls.length
    ? `<div class="p-photo">
         <img id="pPhotoImg" src="${gal.urls[0]}" alt="" onerror="galleryImgErr(this)">
         <div class="p-photo-grad"></div>
         <div class="p-photo-name">${s.n}</div>
         ${multi ? `<button class="p-gnav prev" type="button" aria-label="Previous photo">‹</button><button class="p-gnav next" type="button" aria-label="Next photo">›</button><div class="p-dots">${gal.urls.map((_,i)=>`<span class="p-dot${i===0?" on":""}"></span>`).join("")}</div>` : ""}
       </div>` : "";
  const nameInPad = `<div class="p-name"${gal.urls.length ? " hidden" : ""}>${s.n}</div>`;

  panelBody.innerHTML = `
    ${photo}
    <div class="p-pad">
      ${nameInPad}
      <div class="p-loc">${loc}</div>
      <div class="p-chips">${chips}</div>
      <div class="p-section"><div class="p-h">Programs</div>${prg}</div>
      ${stats}${desc}${recruit}${coaching}${foot}${empty}${note}
    </div>`;
  panelBody.scrollTop = 0;

  if(multi){
    const ph = panelBody.querySelector(".p-photo");
    ph.querySelector(".p-gnav.prev").addEventListener("click", e => { e.stopPropagation(); galStep(-1); });
    ph.querySelector(".p-gnav.next").addEventListener("click", e => { e.stopPropagation(); galStep(1); });
    ph.querySelectorAll(".p-dot").forEach((d,i) => d.addEventListener("click", e => { e.stopPropagation(); gal.idx = i; renderGallery(); }));
  }

  panel.classList.add("open");
  panel.setAttribute("aria-hidden","false");
  focusMarker(s);
}
let gal = { urls: [], idx: 0 };
function renderGallery(){
  const img = document.getElementById("pPhotoImg");
  if(!img) return;
  img.src = gal.urls[gal.idx];
  panelBody.querySelectorAll(".p-dot").forEach((d,i) => d.classList.toggle("on", i === gal.idx));
}
function galStep(d){
  if(gal.urls.length < 2) return;
  gal.idx = (gal.idx + d + gal.urls.length) % gal.urls.length;
  renderGallery();
}
function galleryImgErr(img){
  const ph = img.closest(".p-photo");
  if(gal.urls.length > 1){
    gal.urls.splice(gal.idx, 1);
    if(gal.idx >= gal.urls.length) gal.idx = 0;
    const dotsWrap = ph && ph.querySelector(".p-dots");
    if(gal.urls.length < 2){
      if(dotsWrap) dotsWrap.remove();
      if(ph) ph.querySelectorAll(".p-gnav").forEach(b => b.remove());
    } else if(dotsWrap){
      dotsWrap.innerHTML = gal.urls.map((_,i)=>`<span class="p-dot${i===gal.idx?" on":""}"></span>`).join("");
      dotsWrap.querySelectorAll(".p-dot").forEach((dd,i)=> dd.addEventListener("click", e=>{ e.stopPropagation(); gal.idx=i; renderGallery(); }));
    }
    renderGallery();
  } else {
    if(ph) ph.remove();
    const nm = panelBody.querySelector(".p-name"); if(nm) nm.hidden = false;
  }
}
function focusMarker(s){
  if(!map) return;
  const isMobile = window.innerWidth <= 720;
  const size = map.getSize();
  const pt = map.latLngToContainerPoint([s.lat, s.lng]);
  let dx = 0, dy = 0;
  if(isMobile){ dy = pt.y - size.y * 0.22; }
  else { dx = pt.x - (size.x - Math.min(374, window.innerWidth * 0.9)) / 2; }
  if(Math.abs(dx) > 4 || Math.abs(dy) > 4) map.panBy([dx, dy], {animate:true, duration:0.35});
}
document.getElementById("panelClose").addEventListener("click", closePanel);

/* ---------- render ---------- */
function render(){
  layer.clearLayers();
  let schools = 0, programs = 0, profiled = 0;
  SCHOOLS.forEach(s => {
    const matches = matchingPrograms(s);
    if(matches.length === 0 || !passesFilters(s)) return;
    schools++; programs += matches.length;
    const detail = hasProfile(s);
    if(detail) profiled++;
    const color = DIV[schoolDiv(s)];
    // visible dot (purely visual)
    L.circleMarker([s.lat, s.lng], {
      radius: detail ? 8 : 6,
      color:"#fff", weight: detail ? 2 : 1.4,
      fillColor:color, fillOpacity: detail ? .95 : .78,
      interactive:false
    }).addTo(layer);
    // generous transparent hit target — easy one-click/tap. bubblingMouseEvents:false keeps
    // the click from also reaching the map (which would instantly close the panel).
    L.circleMarker([s.lat, s.lng], {
      radius: 15, stroke:false, fillColor:color, fillOpacity:0,
      bubblingMouseEvents:false
    })
      .bindTooltip(s.n + (detail ? "  ⓘ" : ""), {className:"school-tt", direction:"top", offset:[0,-9]})
      .on("click", () => openPanel(s))
      .addTo(layer);
  });
  document.getElementById("count").innerHTML =
    `<b>${schools}</b> ${schools===1?"school":"schools"} · <b>${programs}</b> ${programs===1?"program":"programs"} · <b>${profiled}</b> profiled`;
}
function fitVisible(){
  const pts = [];
  SCHOOLS.forEach(s => { if(matchingPrograms(s).length && passesFilters(s)) pts.push([s.lat, s.lng]); });
  if(pts.length) map.fitBounds(pts, {padding:[40,40], maxZoom:7});
}

/* ---------- search ---------- */
function initSearch(){
  const input = document.getElementById("search");
  const box = document.getElementById("searchResults");
  let active = -1, items = [];
  function hide(){ box.classList.remove("show"); box.innerHTML = ""; active = -1; items = []; }
  function paint(){ box.querySelectorAll(".sr-item").forEach((el,i) => el.classList.toggle("active", i === active)); }
  function pick(s){ input.value = ""; hide(); input.blur(); if(map.getZoom() < 6) map.setView([s.lat, s.lng], 7, {animate:false}); openPanel(s); }
  function run(){
    const q = input.value.trim().toLowerCase();
    if(!q){ hide(); return; }
    items = SCHOOLS.filter(s => s.n.toLowerCase().includes(q) || (s.c && s.c.toLowerCase().includes(q))).slice(0, 8);
    if(!items.length){ box.innerHTML = `<div class="sr-empty">No matches</div>`; box.classList.add("show"); active = -1; return; }
    box.innerHTML = items.map((s,i) =>
      `<div class="sr-item" data-i="${i}"><span class="sr-dot" style="background:${DIV[schoolDiv(s)]}"></span><span class="sr-name">${s.n}</span><span class="sr-meta">${s.s} · ${schoolDiv(s)}</span></div>`).join("");
    box.classList.add("show"); active = -1;
    box.querySelectorAll(".sr-item").forEach(el => el.addEventListener("mousedown", e => { e.preventDefault(); pick(items[+el.dataset.i]); }));
  }
  input.addEventListener("input", run);
  input.addEventListener("focus", run);
  input.addEventListener("keydown", e => {
    if(e.key === "ArrowDown"){ e.preventDefault(); active = Math.min(active + 1, items.length - 1); paint(); }
    else if(e.key === "ArrowUp"){ e.preventDefault(); active = Math.max(active - 1, 0); paint(); }
    else if(e.key === "Enter"){ e.preventDefault(); if(items.length) pick(items[active >= 0 ? active : 0]); }
    else if(e.key === "Escape"){ hide(); input.blur(); }
  });
  input.addEventListener("blur", () => setTimeout(hide, 150));
}

/* ---------- filters panel ---------- */
function buildFilters(){
  const fp = document.getElementById("filterPanel");
  fp.innerHTML =
    `<div class="fp-head"><span>Filters</span><button id="fpReset" type="button">Reset</button><button id="fpClose" type="button" aria-label="Close">✕</button></div>` +
    `<div class="fp-grid">` + FILTERS.map(f => `<div class="fp-section"><div class="fp-h">${f.label}</div><div class="fp-pills" data-key="${f.key}">${
      f.opts.map(o => `<span class="fp-pill on" data-v="${o}">${o}</span>`).join("")
    }</div></div>`).join("") + `</div>`;
  fp.querySelectorAll(".fp-pills").forEach(grp => {
    const key = grp.dataset.key;
    grp.querySelectorAll(".fp-pill").forEach(pill => {
      pill.addEventListener("click", () => {
        const v = pill.dataset.v;
        if(state[key].has(v)){ state[key].delete(v); pill.classList.remove("on"); }
        else { state[key].add(v); pill.classList.add("on"); }
        render(); updateFilterCount();
      });
    });
  });
  document.getElementById("fpReset").addEventListener("click", () => {
    FILTERS.forEach(f => state[f.key] = new Set(f.opts));
    fp.querySelectorAll(".fp-pill").forEach(p => p.classList.add("on"));
    render(); updateFilterCount();
  });
  document.getElementById("fpClose").addEventListener("click", () => fp.classList.add("hidden"));
  document.getElementById("filterBtn").addEventListener("click", () => fp.classList.toggle("hidden"));
  updateFilterCount();
}
function updateFilterCount(){
  let n = 0; FILTERS.forEach(f => n += (f.opts.length - state[f.key].size));
  const badge = document.getElementById("filterCount");
  badge.textContent = n ? n : "";
  badge.style.display = n ? "inline-flex" : "none";
  document.getElementById("filterBtn").classList.toggle("active", n > 0);
}

/* ---------- app init (runs only after the code unlocks the data) ---------- */
function initApp(data){
  SCHOOLS = data;
  RATED = SCHOOLS.filter(s => s.acad != null).length;

  map = L.map("map", {zoomControl:true, worldCopyJump:true}).setView([39.5, -98.35], 4);
  L.tileLayer("https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png", {
    attribution:'&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/attributions">CARTO</a>',
    subdomains:"abcd", maxZoom:19
  }).addTo(map);
  layer = L.layerGroup().addTo(map);
  map.on("click", closePanel);

  document.querySelectorAll("#genderSeg .seg button").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll("#genderSeg .seg button").forEach(b => b.classList.remove("on"));
      btn.classList.add("on");
      state.gender = btn.dataset.g;
      render();
    });
  });
  document.querySelectorAll("#divGroup .pill").forEach(pill => {
    pill.addEventListener("click", () => {
      const d = pill.dataset.d;
      if(state.divs.has(d)){ state.divs.delete(d); pill.classList.remove("on"); }
      else { state.divs.add(d); pill.classList.add("on"); }
      render();
    });
  });
  document.getElementById("fit").addEventListener("click", fitVisible);
  initSearch();
  buildFilters();

  render();
  setTimeout(() => map.invalidateSize(), 80);
}

/* ---------- public: render immediately ---------- */
initApp(SCHOOLS_DATA);
</script>
